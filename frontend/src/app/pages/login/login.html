<main class="min-h-[80vh] flex items-center justify-center p-md">
  <!-- Contenidor d'inici de sessió -->
  <div class="w-full max-w-[400px] bg-surface-container-low border border-outline-variant p-xl shadow-sm">
    <!-- Logotip / Capçalera -->
    <div class="mb-xl text-center">
      <div class="inline-flex items-center justify-center p-sm bg-surface-container-highest mb-md">
        <span class="material-symbols-outlined text-primary" data-icon="lock">lock</span>
      </div>
      <h1 class="text-headline-md font-headline-md text-on-surface mb-xs uppercase">AUTH_REQUIRED</h1>
      <p class="text-label-caps font-label-caps text-on-surface-variant uppercase">SECURE TERMINAL ACCESS</p>
    </div>
    
    <!-- Formulari d'inici de sessió -->
    <form (ngSubmit)="login()" class="space-y-lg">
      <div class="space-y-xs">
        <label class="text-label-caps font-label-caps text-on-surface-variant block uppercase">EMAIL_ADDRESS</label>
        <input class="w-full bg-surface border border-outline-variant p-sm text-body-base font-body-base focus:ring-0 focus:border-outline focus:border-b-primary-container focus:border-b-2 transition-all outline-none rounded-none" 
               placeholder="user@analytics.cs" type="email" name="email" [(ngModel)]="email" required />
      </div>
      
      <div class="space-y-xs">
        <div class="flex justify-between items-center">
          <label class="text-label-caps font-label-caps text-on-surface-variant block uppercase">PASSWORD</label>
          <a class="text-label-caps font-label-caps text-primary hover:underline cursor-pointer">FORGOT?</a>
        </div>
        <input class="w-full bg-surface border border-outline-variant p-sm text-body-base font-body-base focus:ring-0 focus:border-outline focus:border-b-primary-container focus:border-b-2 transition-all outline-none rounded-none" 
               placeholder="••••••••" type="password" name="password" [(ngModel)]="password" required />
      </div>
      
      <!-- Botó d'acció primari -->
      <button class="w-full bg-primary-container text-on-primary-fixed py-md font-bold text-label-caps font-label-caps tracking-widest hover:brightness-110 active:scale-[0.98] transition-all duration-150 rounded-none border border-primary uppercase" type="submit">
        EXECUTE LOGIN
      </button>
    </form>
    
    <!-- Accions secundàries -->
    <div class="mt-xl pt-lg border-t border-outline-variant text-center">
      <p class="text-body-base font-body-base text-on-surface-variant mb-sm uppercase">NEW_USER?</p>
      <a class="text-label-caps font-label-caps font-bold text-primary hover:bg-surface-container-highest px-md py-sm transition-colors border border-primary uppercase cursor-pointer" routerLink="/register">
        REGISTER ACCOUNT
      </a>
    </div>
    
    <!-- Peu de pàgina d'estat tècnic -->
    <div class="mt-xl flex items-center justify-center gap-xs text-[10px] text-on-surface-variant opacity-60">
      <div class="w-1.5 h-1.5 bg-primary-container rounded-full"></div>
      <span class="font-data-mono uppercase tracking-tighter">System Status: Optimal</span>
      <span class="px-xs">|</span>
      <span class="font-data-mono uppercase tracking-tighter">Port: 8080</span>
    </div>
  </div>
</main>

<!-- Elements de fons (Línies minimalistes) -->
<div class="fixed top-0 left-1/4 w-px h-full bg-outline-variant opacity-10 pointer-events-none"></div>
<div class="fixed top-0 right-1/4 w-px h-full bg-outline-variant opacity-10 pointer-events-none"></div>
