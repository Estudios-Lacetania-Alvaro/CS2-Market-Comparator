<div class="container mt-5">
    <h2>User Profile</h2>
    
    <div>
        <p><strong>Username:</strong> {{ user.name }}</p>
        <p><strong>Email:</strong> {{ user.email }}</p>
        <p><strong>Balance:</strong> ${{ user.balance}}</p>

        <button class="btn btn-danger mt-3" (click)="logout()">Logout</button>
    </div>
</div>
