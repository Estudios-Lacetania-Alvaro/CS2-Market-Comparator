<div class="container-fluid p-0">
    <div class="row g-0" style="min-height: 100vh;">
        <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center p-5" style="background-color: #0b1116; border-right: 1px solid #233140;">
            <div style="max-width: 550px; margin: 0 auto;">
                <h5 class="text-cyan fw-bold mb-5 font-monospace fst-italic">SkinArbitrage</h5>
                <h1 class="display-4 fw-bold text-white mb-2" style="letter-spacing: -1px;">Trade with</h1>
                <h1 class="display-4 fw-bold text-cyan mb-4" style="letter-spacing: -1px;">Precision.</h1>
                <p class="text-muted fs-5 mt-4" style="line-height: 1.6;">
                    The terminal for high-frequency skin arbitrageurs. Institutional-grade data at your fingertips.
                </p>
            </div>
        </div>

        <div class="col-lg-6 d-flex align-items-center justify-content-center p-4 p-md-5" style="background-color: #151e27;">
            <div style="max-width: 480px; width: 100%;">
                <h2 class="fw-bold text-white mb-1">Initialize Account</h2>
                <p class=" mb-5 text-white">Access the arbitrage terminal</p>

                <form (ngSubmit)="register()">
                    <div class="mb-4">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control dark-input" name="name" [(ngModel)]="name" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control dark-input" name="email" [(ngModel)]="email" required>
                    </div>
                    
                    <div class="row mb-5">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control dark-input" name="password" [(ngModel)]="password" placeholder="••••••••" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Password Confirmation</label>
                            <input type="password" class="form-control dark-input" name="password_confirmation" [(ngModel)]="password_confirmation" placeholder="••••••••" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-cyan w-100 mb-4 fw-bold py-2">Create Account</button>

                    <p class="text-center mb-0 text-light" style="font-size: 0.85rem;">
                        Already authenticated? <a href="/login" class="text-cyan text-decoration-none fw-bold ms-1">Login to Terminal</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</div>
